# ─────────────────────────────────────────────────────────────────────────────
#  SyncWatch — Локальная среда разработки
#  Поднимает: PostgreSQL + Redis + Node.js бэкенд с авто-применением миграций.
#
#  Запуск:   docker compose -f devops/docker-compose.local.yml --env-file devops/.env.local up -d
#  Логи:     docker compose -f devops/docker-compose.local.yml logs -f app
#  Остановка: docker compose -f devops/docker-compose.local.yml down
# ─────────────────────────────────────────────────────────────────────────────

name: raveclone-local

services:

  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: raveclone-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-raveclone}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # pg_isready проверяет готовность БД к приёму соединений
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-raveclone}"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s

  # ─── Redis ─────────────────────────────────────────────────────────────────
  # Хранит: стейт комнат, множества участников, онлайн-статусы пользователей,
  # FCM-токены. Persistence включён (appendonly) для выживания рестартов.
  redis:
    image: redis:7-alpine
    container_name: raveclone-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 3s

  # ─── Backend (Node.js + Fastify) ───────────────────────────────────────────
  # Сборка из Dockerfile в корне /server. После старта ждёт готовности БД и Redis,
  # затем накатывает миграции Prisma и стартует сервер с hot-reload (tsx watch).
  app:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: raveclone-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-raveclone}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-change-me}
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:3000,http://127.0.0.1:3000,http://localhost:8080,raveclone://app
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY:-}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL:-}
      YTDLP_PATH: yt-dlp
      RATE_LIMIT_MAX: 1000
      RATE_LIMIT_WINDOW: 60000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Live-reload исходников (hot edit без пересборки образа)
      - ../server/src:/app/src
      - ../server/prisma:/app/prisma
    # Цепочка: ждём БД → накатываем схему → стартуем dev-сервер
    command: >
      sh -c "
        echo '[app] Ожидание PostgreSQL...' &&
        npx prisma db push --accept-data-loss &&
        echo '[app] Миграции применены. Старт сервера...' &&
        npm run dev
      "
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  # ─── (Опционально) Adminer — веб-инспектор БД ──────────────────────────────
  # Откройте http://localhost:8080 → PostgreSQL → db:5432 → postgres/postgres
  adminer:
    image: adminer:latest
    container_name: raveclone-adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
    name: raveclone_postgres_data
  redis_data:
    name: raveclone_redis_data
