name: RaveClone
options:
  bundleIdPrefix: com.syncwatch
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "2QAMUC4Z4P"
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1,2"
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    OTHER_LDFLAGS: ""

targets:
  RaveClone:
    type: application
    platform: iOS
    sources:
      - path: RaveClone
        excludes:
          - "**/.DS_Store"
      - path: RaveClone/Resources/Info.plist
        buildPhase: none
    resources:
      - path: RaveClone/Resources
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.syncwatch.raveclone
        INFOPLIST_FILE: RaveClone/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: RaveClone/Resources/RaveClone.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: "2QAMUC4Z4P"
        CODE_SIGN_IDENTITY: "Apple Development"
        SUPPORTS_MACCATALYST: NO
    info:
      path: RaveClone/Resources/Info.plist
      properties:
        CFBundleDisplayName: Плинк
        UILaunchScreen:
          UIColorName: raveBackground
        UIRequiresFullScreen: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: RaveClone/Resources/RaveClone.entitlements
    # WebRTC暂时排除，待后续集成
    # dependencies:
    #   - package: GoogleWebRTC
    #     product: GoogleWebRTC
